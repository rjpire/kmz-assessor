# County Assessor GIS Registry
# ==============================
# Each entry maps a county (or whole state) to a free public ArcGIS REST parcel service.
#
# Key formats:
#   "{county}_{state}"  — exact county match, e.g. "weld_colorado"
#   "_{state}"          — state-level fallback: any county in that state that isn't
#                         registered individually will use this endpoint automatically
#                         e.g. "_colorado" covers all 64 CO counties
#
# Lookup priority: exact county match → state fallback → "not registered" warning
#
# type options:
#   arcgis_rest  — Standard Esri ArcGIS REST API (most common)
#   (future)     — Beacon/Schneidercorp, Tyler Technologies, etc.

counties:

  # ---------------------------------------------------------------------------
  # STATE FALLBACKS
  # Keys starting with _ are catch-alls: any county in that state that isn't
  # registered individually will automatically use this endpoint.
  # ---------------------------------------------------------------------------

  _colorado:
    name: "Colorado (statewide fallback — all 64 counties)"
    type: arcgis_rest
    assessor_portal: ""
    url: "https://gis.colorado.gov/public/rest/services/Address_and_Parcel/Colorado_Public_Parcels/FeatureServer/0/query"
    fields:
      parcel_id:        parcel_id
      owner:            owner
      mail_address:     ownerAdd
      mail_city:        ownAddCty
      mail_state:       ownAddStt
      mail_zip:         ownAddZip
      legal_description: legalDesc
      situs_address:    situsAdd
      actual_value:     apprValTot
      assessed_value:   asedValTot
      acreage:          landAcres

  _wyoming:
    name: "Wyoming (statewide fallback — all 23 counties)"
    type: arcgis_rest
    assessor_portal: ""
    url: "https://services3.arcgis.com/r0iJ85SKZ4zAzz3P/arcgis/rest/services/Wyoming_Parcels_for_2025/FeatureServer/0/query"
    fields:
      parcel_id:        parcelnb
      account_no:       accountno
      owner:            ownername1
      mail_address:     mailaddres
      mail_city:        mailcity
      mail_state:       mailstate
      mail_zip:         mailzipcod
      situs_address:    locationad
      legal_description: legal
      actual_value:     actualvalu
      assessed_value:   assessedva
      acreage:          LANDGROSSA
      tax_year:         taxyear

  # ---------------------------------------------------------------------------
  # COLORADO — county-specific overrides (richer data than the state service)
  # ---------------------------------------------------------------------------

  weld_colorado:
    name: "Weld County, CO"
    type: arcgis_rest
    assessor_portal: "https://apps.weld.gov/propertyportal/"
    url: "https://services.arcgis.com/ewjSqmSyHJnkfBLL/arcgis/rest/services/Mobile_Parcel_View/FeatureServer/0/query"
    fields:
      parcel_id:        PARCEL
      account_no:       accountno
      owner:            ownername1
      mail_address:     mailaddress1
      mail_city:        mailcity
      mail_state:       mailstate
      mail_zip:         mailzipcode
      legal_description: Legal
      situs_address:    SITUS
      actual_value:     Actualval
      assessed_value:   Assessedval
      acreage:          GIS_Acres
      tax_year:         Taxyear
      section_township_range: STR2

